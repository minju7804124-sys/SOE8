<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SoE! Portfolio</title>
  <style>
    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      background: #000;
    }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    a { color: inherit; text-decoration: none; }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .media,
    .fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .fallback {
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .page.ended .fallback { opacity: 1; }
    .page.ended .media { opacity: 0; }

    .hotspot-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      background: transparent;
      pointer-events: auto;
      text-indent: -9999px;
      overflow: hidden;
      cursor: pointer;
    }

    .hotspot:focus-visible {
      outline: 1px solid rgba(255,255,255,.7);
      outline-offset: 2px;
    }

    @media (max-width: 900px) {
      html { scroll-snap-type: none; }
      .page {
        min-height: auto;
        height: auto;
      }
      .frame {
        width: 100vw;
        height: calc(100vw * 9 / 16);
      }
    }
  </style>
</head>
<body>
  <main id="app"></main>

  <script src="site-config.js"></script>
  <script>
    const PAGES = [
      { num: "1",  category: "home" },
      { num: "2",  category: "about" },
      { num: "3",  category: "film",       watch: "film1" },
      { num: "4",  category: "animation",  watch: "animation1" },
      { num: "5",  category: "animation",  watch: "animation2" },
      { num: "6",  category: "commercial", watch: "commercial1" },
      { num: "7",  category: "commercial", watch: "commercial2" },
      { num: "8",  category: "commercial", watch: "commercial3" },
      { num: "9",  category: "works",      watch: "works1" },
      { num: "10", category: "works" },
      { num: "11", category: "works" },
      { num: "12", category: "works" },
      { num: "13", category: "contact" },
      { num: "14", category: "contact" }
    ];

    const NAV_TARGET = {
      home: "page-1",
      about: "page-2",
      film: "page-3",
      animation: "page-4",
      commercial: "page-6",
      works: "page-9",
      contact: "page-13"
    };

    function youtubeLink(key) {
      return (window.SOE_CONFIG && window.SOE_CONFIG.links && window.SOE_CONFIG.links[key]) || "https://www.youtube.com/";
    }

    // 원본 디자인 내부 좌표 (실제 표시되는 영상 영역 기준, %)
    const NAV_RECTS = {
      home:       { x: 53.3, y: 9.0, w: 5.8, h: 4.8 },
      about:      { x: 60.2, y: 9.0, w: 6.4, h: 4.8 },
      film:       { x: 67.9, y: 9.0, w: 5.1, h: 4.8 },
      animation:  { x: 73.9, y: 9.0, w: 10.8, h: 4.8 },
      commercial: { x: 85.2, y: 9.0, w: 13.0, h: 4.8 },
      works:      { x: 91.2, y: 9.0, w: 6.8, h: 4.8 },
      contact:    { x: 98.4, y: 9.0, w: 8.8, h: 4.8, alignRight: true }
    };

    const WATCH_RECTS = {
      "3": { x: 87.0, y: 53.6, w: 11.8, h: 5.8 },
      "4": { x: 76.6, y: 82.3, w: 15.6, h: 6.2 },
      "5": { x: 77.2, y: 79.8, w: 15.6, h: 6.2 },
      "6": { x: 46.0, y: 79.3, w: 14.0, h: 6.3 },
      "7": { x: 46.0, y: 79.3, w: 14.0, h: 6.3 },
      "8": { x: 46.0, y: 79.3, w: 14.0, h: 6.3 },
      "9": { x: 84.2, y: 83.8, w: 10.2, h: 5.0 }
    };

    const app = document.getElementById("app");

    app.innerHTML = PAGES.map(page => `
      <section class="page" id="page-${page.num}">
        <div class="frame">
          <video
            class="media"
            playsinline
            muted
            preload="metadata"
            poster="assets/${page.num}.jpg"
          >
            <source src="assets/${page.num}.mp4" type="video/mp4">
          </video>

          <img
            class="fallback"
            src="assets/${page.num}-end.jpg"
            alt=""
            aria-hidden="true"
          >

          <div class="hotspot-layer"></div>
        </div>
      </section>
    `).join("");

    function createHotspot(href, rect, label, newTab = false) {
      const a = document.createElement("a");
      a.className = "hotspot";
      a.href = href;
      a.textContent = label;
      if (newTab) {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      }
      a.dataset.x = rect.x;
      a.dataset.y = rect.y;
      a.dataset.w = rect.w;
      a.dataset.h = rect.h;
      a.dataset.alignRight = rect.alignRight ? "1" : "0";
      return a;
    }

    function buildHotspots() {
      document.querySelectorAll(".page").forEach(pageEl => {
        const pageNum = pageEl.id.replace("page-", "");
        const layer = pageEl.querySelector(".hotspot-layer");
        layer.innerHTML = "";

        layer.appendChild(createHotspot(`#${NAV_TARGET.home}`, NAV_RECTS.home, "HOME"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.about}`, NAV_RECTS.about, "ABOUT"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.film}`, NAV_RECTS.film, "FILM"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.animation}`, NAV_RECTS.animation, "ANIMATION"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.commercial}`, NAV_RECTS.commercial, "COMMERCIAL"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.works}`, NAV_RECTS.works, "WORKS"));
        layer.appendChild(createHotspot(`#${NAV_TARGET.contact}`, NAV_RECTS.contact, "CONTACT"));

        const pageData = PAGES.find(p => p.num === pageNum);
        if (pageData && pageData.watch && WATCH_RECTS[pageNum]) {
          layer.appendChild(
            createHotspot(
              youtubeLink(pageData.watch),
              WATCH_RECTS[pageNum],
              "WATCH FILM",
              true
            )
          );
        }
      });
    }

    function layoutHotspots() {
      document.querySelectorAll(".page").forEach(pageEl => {
        const frame = pageEl.querySelector(".frame");
        const media = pageEl.querySelector(".media");
        const layer = pageEl.querySelector(".hotspot-layer");

        const fw = frame.clientWidth;
        const fh = frame.clientHeight;

        // 원본 비율 16:9 기준
        const mediaRatio = 16 / 9;
        const frameRatio = fw / fh;

        let rw, rh, rx, ry;
        if (frameRatio > mediaRatio) {
          rh = fh;
          rw = rh * mediaRatio;
          rx = (fw - rw) / 2;
          ry = 0;
        } else {
          rw = fw;
          rh = rw / mediaRatio;
          rx = 0;
          ry = (fh - rh) / 2;
        }

        layer.querySelectorAll(".hotspot").forEach(h => {
          const x = parseFloat(h.dataset.x);
          const y = parseFloat(h.dataset.y);
          const w = parseFloat(h.dataset.w);
          const hgt = parseFloat(h.dataset.h);
          const alignRight = h.dataset.alignRight === "1";

          const pxW = rw * (w / 100);
          const pxH = rh * (hgt / 100);
          let pxX = rx + rw * (x / 100);
          const pxY = ry + rh * (y / 100);

          if (alignRight) {
            pxX = rx + rw - pxW;
          }

          h.style.left = pxX + "px";
          h.style.top = pxY + "px";
          h.style.width = pxW + "px";
          h.style.height = pxH + "px";
        });
      });
    }

    buildHotspots();
    window.addEventListener("load", layoutHotspots);
    window.addEventListener("resize", layoutHotspots);

    const videos = Array.from(document.querySelectorAll(".media"));

    function resetAndPlay(video) {
      const page = video.closest(".page");
      if (!page) return;
      page.classList.remove("ended");
      try { video.currentTime = 0; } catch (e) {}
      const p = video.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    }

    function stopVideo(video) {
      video.pause();
    }

    videos.forEach(video => {
      const page = video.closest(".page");
      if (!page) return;

      video.addEventListener("ended", () => {
        page.classList.add("ended");
      });

      video.addEventListener("error", () => {
        page.classList.add("ended");
      });

      video.addEventListener("loadedmetadata", layoutHotspots);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) {
          resetAndPlay(video);
        } else {
          stopVideo(video);
        }
      });
    }, { threshold: 0.65 });

    videos.forEach(video => observer.observe(video));
  </script>
</body>
</html>
