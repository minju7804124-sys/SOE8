  <style>
    * { box-sizing: border-box; }
    html {
      scroll-behavior: smooth;
      scroll-snap-type: y mandatory;
      background: #000;
    }
    body {
      margin: 0;
      background: #000;
      color: #fff;
      overflow-x: hidden;
      font-family: Arial, Helvetica, sans-serif;
    }
    a { color: inherit; text-decoration: none; }

    .page {
      position: relative;
      width: 100%;
      height: 100vh;
      min-height: 100vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      overflow: hidden;
    }

    .frame {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
      overflow: hidden;
    }

    .media,
    .fallback {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
      display: block;
    }

    .fallback {
      opacity: 0;
      pointer-events: none;
      z-index: 2;
    }

    .page.ended .fallback { opacity: 1; }
    .page.ended .media { opacity: 0; }

    .hotspot-layer {
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .hotspot {
      position: absolute;
      display: block;
      background: transparent;
      pointer-events: auto;
      text-indent: -9999px;
      overflow: hidden;
      cursor: pointer;
    }

    .hotspot:focus-visible {
      outline: 1px solid rgba(255,255,255,.7);
      outline-offset: 2px;
    }

    @media (max-width: 900px) {
      html { scroll-snap-type: none; }
      .page {
        min-height: auto;
        height: auto;
      }
      .frame {
        width: 100vw;
        height: calc(100vw * 9 / 16);
      }
    }
  </style>

    function youtubeLink(key) {
      return (window.SOE_CONFIG && window.SOE_CONFIG.links && window.SOE_CONFIG.links[key]) || "https://www.youtube.com/";

    const app = document.getElementById("app");

    app.innerHTML = PAGES.map(page => `
      <section class="page" id="page-${page.num}">
        <div class="frame">
          <video class="media" playsinline muted preload="metadata" poster="assets/${page.num}.jpg">
            <source src="assets/${page.num}.mp4" type="video/mp4">
          </video>
          <img class="fallback" src="assets/${page.num}-end.jpg" alt="" aria-hidden="true">
          <div class="hotspot-layer"></div>
        </div>
      </section>
    `).join("");

    function createHotspot(href, rect, label, newTab = false) {
      const a = document.createElement("a");
      a.className = "hotspot";
      a.href = href;
      a.textContent = label;
      if (newTab) {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      }
      a.dataset.x = rect.x;
      a.dataset.y = rect.y;
      a.dataset.w = rect.w;
      a.dataset.h = rect.h;
      a.dataset.alignRight = rect.alignRight ? "1" : "0";
      return a;
    }

    function buildHotspots() {
      document.querySelectorAll(".page").forEach(pageEl => {
        const num = pageEl.id.replace("page-", "");
        const layer = pageEl.querySelector(".hotspot-layer");
        layer.innerHTML = "";

        const menu = PAGE_MENU_RECTS[num];
        layer.appendChild(createHotspot(TARGETS.home, menu.home, "HOME"));
        layer.appendChild(createHotspot(TARGETS.about, menu.about, "ABOUT"));
        layer.appendChild(createHotspot(TARGETS.film, menu.film, "FILM"));
        layer.appendChild(createHotspot(TARGETS.animation, menu.animation, "ANIMATION"));
        layer.appendChild(createHotspot(TARGETS.commercial, menu.commercial, "COMMERCIAL"));
        layer.appendChild(createHotspot(TARGETS.works, menu.works, "WORKS"));
        layer.appendChild(createHotspot(TARGETS.contact, menu.contact, "CONTACT"));

        const pageData = PAGES.find(p => p.num === num);
        if (pageData && pageData.watch && PAGE_WATCH_RECTS[num]) {
          layer.appendChild(
            createHotspot(
              youtubeLink(pageData.watch),
              PAGE_WATCH_RECTS[num],
              "WATCH FILM",
              true
            )
          );
        }
      });
    }

    function layoutHotspots() {
      document.querySelectorAll(".page").forEach(pageEl => {
        const frame = pageEl.querySelector(".frame");
        const layer = pageEl.querySelector(".hotspot-layer");

        const fw = frame.clientWidth;
        const fh = frame.clientHeight;
        const mediaRatio = 16 / 9;
        const frameRatio = fw / fh;

        let rw, rh, rx, ry;
        if (frameRatio > mediaRatio) {
          rh = fh;
          rw = rh * mediaRatio;
          rx = (fw - rw) / 2;
          ry = 0;
        } else {
          rw = fw;
          rh = rw / mediaRatio;
          rx = 0;
          ry = (fh - rh) / 2;
        }

        layer.querySelectorAll(".hotspot").forEach(el => {
          const x = parseFloat(el.dataset.x);
          const y = parseFloat(el.dataset.y);
          const w = parseFloat(el.dataset.w);
          const h = parseFloat(el.dataset.h);
          const alignRight = el.dataset.alignRight === "1";

          const pxW = rw * (w / 100);
          const pxH = rh * (h / 100);
          let pxX = rx + rw * (x / 100);
          const pxY = ry + rh * (y / 100);

          if (alignRight) {
            pxX = rx + rw - pxW;
          }

          el.style.left = pxX + "px";
          el.style.top = pxY + "px";
          el.style.width = pxW + "px";
          el.style.height = pxH + "px";
        });
      });
    }

    buildHotspots();
    window.addEventListener("load", layoutHotspots);
    window.addEventListener("resize", layoutHotspots);

    const videos = Array.from(document.querySelectorAll(".media"));

    function resetAndPlay(video) {
      const page = video.closest(".page");
      if (!page) return;
      page.classList.remove("ended");
      try { video.currentTime = 0; } catch(e) {}
      const p = video.play();
      if (p && typeof p.catch === "function") p.catch(() => {});
    }

    function stopVideo(video) {
      video.pause();
    }

    videos.forEach(video => {
      const page = video.closest(".page");
      if (!page) return;

      video.addEventListener("ended", () => {
        page.classList.add("ended");
      });

      video.addEventListener("error", () => {
        page.classList.add("ended");
      });

      video.addEventListener("loadedmetadata", layoutHotspots);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) {
          resetAndPlay(video);
        } else {
          stopVideo(video);
        }
      });
    }, { threshold: 0.65 });

    videos.forEach(video => observer.observe(video));
